name: topk-merge

on:
  pull_request_target:
    types:
      - ready_for_review
      - synchronize
      - reopened
  workflow_run:
    workflows:
      - tests
    types:
      - completed

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  merge-verified-topk:
    if: >-
      (github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0].number != 0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Resolve and validate Top-K repair PR
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail
          head_repo="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.repo.full_name')"
          head_ref="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.ref')"
          is_draft="$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json isDraft --jq '.isDraft')"

          if [ "${head_repo}" != "${REPOSITORY}" ]; then
            echo "Fork PRs are not auto-merged."
            exit 0
          fi
          if [[ "${head_ref}" != fix/topk-* ]]; then
            echo "Not a Top-K repair branch; leaving merge to normal review."
            exit 0
          fi
          if [ "${is_draft}" = "true" ]; then
            echo "Top-K repair is still Draft; waiting for Ready for review."
            exit 0
          fi

          python3 09_tools/vp.py evolve issues check-pr \
            --repo "${REPOSITORY}" \
            --pr "${PR_NUMBER}" \
            --require-topk
          python3 09_tools/vp.py evolve issues merge \
            --repo "${REPOSITORY}" \
            --pr "${PR_NUMBER}" \
            --apply \
            --auto
