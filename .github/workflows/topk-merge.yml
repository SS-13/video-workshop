name: topk-merge

on:
  pull_request_target:
    types:
      - ready_for_review
      - synchronize
      - reopened
      - closed
  workflow_run:
    workflows:
      - tests
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  merge-verified-topk:
    if: >-
      (github.event_name == 'pull_request_target' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0].number != 0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Resolve and validate Top-K repair PR
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail
          head_repo="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.repo.full_name')"
          head_ref="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.ref')"
          is_draft="$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json isDraft --jq '.isDraft')"

          if [ "${head_repo}" != "${REPOSITORY}" ]; then
            echo "Fork PRs are not auto-merged."
            exit 0
          fi
          if [[ "${head_ref}" != fix/topk-* ]]; then
            echo "Not a Top-K repair branch; leaving merge to normal review."
            exit 0
          fi
          if [ "${is_draft}" = "true" ]; then
            echo "Top-K repair is still Draft; waiting for Ready for review."
            exit 0
          fi

          python3 09_tools/vp.py evolve issues check-pr \
            --repo "${REPOSITORY}" \
            --pr "${PR_NUMBER}" \
            --require-topk
          python3 09_tools/vp.py evolve issues merge \
            --repo "${REPOSITORY}" \
            --pr "${PR_NUMBER}" \
            --apply \
            --auto

  reconcile-merged-topk:
    if: >-
      (github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'fix/topk-')) ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0].number != 0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Close verified issues after merge
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          pull_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"
          head_repo="$(jq -r '.head.repo.full_name // empty' <<<"${pull_json}")"
          head_ref="$(jq -r '.head.ref // empty' <<<"${pull_json}")"
          base_ref="$(jq -r '.base.ref // empty' <<<"${pull_json}")"

          if [ "${head_repo}" != "${REPOSITORY}" ] || [[ "${head_ref}" != fix/topk-* ]] || [ "${base_ref}" != "${DEFAULT_BRANCH}" ]; then
            echo "Not a same-repository Top-K repair targeting the default branch; nothing to reconcile."
            exit 0
          fi

          merged="$(jq -r '.merged // false' <<<"${pull_json}")"
          if [ "${merged}" != "true" ] && [ "${{ github.event_name }}" = "workflow_run" ]; then
            for attempt in $(seq 1 24); do
              sleep 5
              pull_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"
              merged="$(jq -r '.merged // false' <<<"${pull_json}")"
              [ "${merged}" = "true" ] && break
            done
          fi

          if [ "${merged}" != "true" ]; then
            echo "Top-K repair has not reached the default branch; leaving Issues open."
            exit 0
          fi

          python3 09_tools/vp.py evolve issues reconcile \
            --repo "${REPOSITORY}" \
            --pr "${PR_NUMBER}" \
            --apply
